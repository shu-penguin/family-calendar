<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,Hiragino Sans,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;padding-bottom:calc(80px + var(--sb));}
#sBar{display:none;position:fixed;top:0;left:0;right:0;z-index:300;background:var(--ac);color:#fff;font-size:.74rem;font-weight:700;text-align:center;padding:4px;}

header{background:var(--s);border-bottom:2px solid var(--b);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(61,43,31,.08);}
.logo{font-size:1.1rem;font-weight:700;}.logo span{color:var(--ac);}
.nm{display:flex;align-items:center;gap:6px;}

.nm button:active{background:var(--al);}
#mLbl{font-weight:700;font-size:.95rem;min-width:80px;text-align:center;}
.hbtns{display:flex;gap:6px;align-items:center;}
.ibtn{background:none;border:2px solid var(--b);border-radius:99px;padding:5px 10px;font-size:.95rem;cursor:pointer;position:relative;}
.ibtn:active{background:var(--al);}
#hBadge{display:none;position:absolute;top:-5px;right:-5px;background:#e05a5a;color:#fff;font-size:.60rem;font-weight:700;min-width:16px;height:16px;border-radius:99px;padding:0 4px;line-height:16px;text-align:center;pointer-events:none;}
#hBadge.show{display:block;}
#leg{display:flex;gap:8px;padding:6px 10px;border-bottom:1px solid var(--b);background:var(--s);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;}
.dot{width:8px;height:8px;border-radius:50%;}
#cWrap{padding:6px;overflow-x:hidden;touch-action:pan-y;}
#cGrid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:auto;gap:3px;align-items:stretch;width:100%;min-width:0;}
.dh{text-align:center;font-size:.70rem;font-weight:700;color:var(--tm);padding:2px 0 4px;min-width:0;}
.dh.sun{color:#e05a5a;}.dh.sat{color:#5b8dee;}
.cell{background:var(--s);border:1.5px solid var(--b);border-radius:7px;padding:3px 2px 2px;cursor:pointer;position:relative;min-width:0;overflow:hidden;min-height:60px;}
.cell:active{background:var(--al);}
.oth{opacity:.35;background:transparent;border-color:transparent;}
.nxt{opacity:.55;background:var(--bg);border-color:var(--b);}
.tdy{border-color:var(--ac);background:var(--al);}
.cpsel{border-color:var(--ac);border-width:2px;background:var(--al);box-shadow:0 0 0 2px var(--ac);}
.cd{font-size:.67rem;font-weight:700;margin-bottom:1px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.tdy .cd{background:var(--ac);color:#fff;}
.hn{font-size:.48rem;color:#e05a5a;opacity:.7;line-height:1.1;white-space:nowrap;overflow:visible;margin-bottom:1px;font-weight:600;}
.en{font-size:.48rem;color:#999;opacity:.85;line-height:1.1;white-space:nowrap;overflow:visible;margin-bottom:1px;font-weight:500;}
.chip{font-weight:700;border-radius:3px;padding:1px 2px;margin-bottom:1px;cursor:pointer;display:block;max-width:100%;overflow:hidden;line-height:1.2;}
.ct{display:block;line-height:1.2;font-weight:700;word-break:break-all;}
.ct.s{white-space:nowrap;overflow:hidden;word-break:normal;}
.ctm{display:block;opacity:.8;white-space:nowrap;font-weight:500;line-height:1.15;}

#nameSub{width:100%;background:var(--ac);color:#fff;border:none;border-radius:12px;padding:13px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;}

.iosx{float:right;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--tm);}
.iossteps{font-size:.80rem;color:var(--tm);margin-top:8px;line-height:1.75;}
</style>
</head>

<script>

var FB_URL='https://family-calendar-ee093-default-rtdb.firebaseio.com/events';
var FB_LOG='https://family-calendar-ee093-default-rtdb.firebaseio.com/logs';
var FB_KEY='AIzaSyDeXIUw4alDboi0Z-P2s2HDKKKdTAgdZcg';
var today=new Date();
var curY=today.getFullYear(),curM=today.getMonth();
var events={};
var editKey=null,selWho='kazoku';
var cpMode=false,cpSrcKey=null,cpDates=[];
var userName='';

var MID=['papa','mama','son1','son2','kazoku'];
var MDEF=['\u30D1\u30D1','\u30DE\u30DE','\u9577\u7537','\u6B21\u7537','\u5BB6\u65CF\u5168\u54E1'];
var MLABEL=[null,null,null,null,null];
var MCOLOR=['#5b8dee','#e86fa0','#f4a431','#a066cc','#52b788'];
var MLIGHT=['#dce9fd','#fde0ec','#fef3dc','#f0e4fa','#d8f3e5'];
var MEMOJI=['\uD83D\uDC68','\uD83D\uDC69','\uD83D\uDC66','\uD83D\uDC76','\uD83C\uDFE0'];

function pad(n){var s=String(n);return s.length<2?'0'+s:s;}
function toDS(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function midx(id){for(var i=0;i<MID.length;i++){if(MID[i]===id)return i;}return -1;}
function gmem(id){var i=midx(id);if(i<0)return {color:'#999',light:'#eee',label:id,emoji:''};return {color:MCOLOR[i],light:MLIGHT[i],label:MLABEL[i],emoji:MEMOJI[i]};}
function saveMembers(){var a=[];for(var i=0;i<MID.length;i++)a.push({label:MLABEL[i],color:MCOLOR[i],light:MLIGHT[i]});localStorage.setItem('fam_mb4',JSON.stringify(a));}
function loadMembers(){

function getVis(yr,mo){
  var res=[],dim=new Date(yr,mo+1,0).getDate(),ks=Object.keys(events);
  for(var ki=0;ki<ks.length;ki++){
    var k=ks[ki],ev=events[k];
    if(!ev||!ev.date)continue;
    var ed=new Date(ev.date+'T00:00:00'),eD=ed.getDate();
    var tag={};for(var p in ev)tag[p]=ev[p];tag._key=k;
    if(!ev.repeat||ev.repeat==='none'){res.push(tag);}
    else if(ev.repeat==='weekly'){
      var dow=ed.getDay();
      for(var d=1;d<=dim;d++){var cd=new Date(yr,mo,d);if(cd.getDay()===dow&&cd>=ed)res.push({_key:k,title:ev.title,date:yr+'-'+pad(mo+1)+'-'+pad(d),timeStart:ev.timeStart,timeEnd:ev.timeEnd,who:ev.who,repeat:ev.repeat,memo:ev.memo});}
    }else if(ev.repeat==='monthly'&&eD<=dim){
      var td=new Date(yr,mo,eD);if(td>=ed)res.push({_key:k,title:ev.title,date:yr+'-'+pad(mo+1)+'-'+pad(eD),timeStart:ev.timeStart,timeEnd:ev.timeEnd,who:ev.who,repeat:ev.repeat,memo:ev.memo});
    }
  }
  return res;
}

  return m+'/'+d+'('+DN[new Date(y,m-1,d).getDay()]+')';

    document.getElementById('evOv').querySelector('.modal').appendChild(cr);
  }else{
    document.getElementById('mTitle').textContent='\u4E88\u5B9A\u3092\u8FFD\u52A0';
    document.getElementById('fTit').value='';
    document.getElementById('fDt').value=pre||'';
    document.getElementById('fTs').value='';document.getElementById('fTe').value='';
    document.getElementById('fRep').value='none';document.getElementById('fMemo').value='';
    selWho='kazoku';
    if(dBtn)dBtn.parentNode.removeChild(dBtn);
  }
  buildWho();
  document.getElementById('evOv').classList.add('open');
}
function closeModal(){
  document.getElementById('evOv').classList.remove('open');
  var cr=document.getElementById('cpBtnRow');if(cr)cr.parentNode.removeChild(cr);
  editKey=null;
}
function doSave(){
  var title=document.getElementById('fTit').value.trim();
  var date=document.getElementById('fDt').value;
  if(!title||!date){alert('\u30BF\u30A4\u30C8\u30EB\u3068\u65E5\u4ED8\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return;}
  var ev={title:title,date:date,timeStart:document.getElementById('fTs').value,timeEnd:document.getElementById('fTe').value,who:selWho,repeat:document.getElementById('fRep').value,memo:document.getElementById('fMemo').value.trim()};
  if(editKey)ev._key=editKey;
  var op=editKey?'\u7DE8\u96C6':'\u8FFD\u52A0';
  closeModal();fbSave(ev);saveLog(op,title,date);
}
function doDelete(){
  if(!confirm('\u3053\u306E\u4E88\u5B9A\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F'))return;
  var k=editKey,ev=events[k]||{};
  closeModal();saveLog('\u524A\u9664',ev.title||'',ev.date||'');fbDel(k);
}

function openDay(ds){
  var p=ds.split('-');var y=parseInt(p[0]),m=parseInt(p[1]),d=parseInt(p[2]);
  var dow=DN[new Date(y,m-1,d).getDay()];
  var t=new Date();
  var lbl=(y===t.getFullYear()&&m===t.getMonth()+1&&d===t.getDate())?('\u4ECA\u65E5 '+m+'/'+d+'('+dow+')'):(m+'\u6708'+d+'\u65E5('+dow+')');
  document.getElementById('dayTit').textContent=lbl;
  var vs=getVis(y,m-1),devs=[];
  for(var i=0;i<vs.length;i++){if(vs[i].date===ds)devs.push(vs[i]);}
  devs.sort(function(a,b){return midx(a.who)-midx(b.who);});
  var dl=document.getElementById('dayList');dl.innerHTML='';
  if(!devs.length){dl.innerHTML='<div class="noev">\uD83D\uDCED \u3053\u306E\u65E5\u306E\u4E88\u5B9A\u306F\u3042\u308A\u307E\u305B\u3093</div>';}
  else{
    for(var j=0;j<devs.length;j++){
      (function(ev){
        var mem=gmem(ev.who);
        var item=document.createElement('div');item.className='ditem';
        var ts=ev.timeStart?(ev.timeStart+(ev.timeEnd?'\u2013'+ev.timeEnd:'')):'';
        item.innerHTML='<div class="dbar" style="background:'+mem.color+'"></div>'+
          '<div class="dbody"><div class="dtit">'+ev.title+'</div>'+
          (ts?'<div class="dmeta">\uD83D\uDD50 '+ts+'</div>':'')+
          (ev.memo?'<div class="dmeta">\uD83D\uDCDD '+ev.memo+'</div>':'')+'</div>'+
          '<div class="dwho" style="background:'+mem.light+';color:'+mem.color+'">'+mem.emoji+mem.label+'</div>';
        (function(k){item.onclick=function(){closeDay();setTimeout(function(){openModal(k);},50);};})(ev._key);
        dl.appendChild(item);
      })(devs[j]);
    }
  }
  (function(dss){document.getElementById('dayAdd').onclick=function(){closeDay();setTimeout(function(){openModal(null,dss);},50);};})(ds);
  document.getElementById('dayOv').classList.add('open');
}
function closeDay(){document.getElementById('dayOv').classList.remove('open');}

function startCp(key){var ev=events[key];if(!ev)return;cpMode=true;cpSrcKey=key;cpDates=[];document.getElementById('cpTit').textContent=ev.title;document.getElementById('cpCnt').textContent='0';document.getElementById('cpBar').classList.add('show');closeModal();render();}
function exitCp(){cpMode=false;cpSrcKey=null;cpDates=[];document.getElementById('cpBar').classList.remove('show');render();}
function toggleCp(ds){var idx=cpDates.indexOf(ds);if(idx>=0)cpDates.splice(idx,1);else cpDates.push(ds);document.getElementById('cpCnt').textContent=cpDates.length;render();}
function doCp(){
  var src=events[cpSrcKey];if(!src)return;
  var data={};for(var p in src){if(p!=='_key')data[p]=src[p];}
  var dates=cpDates.slice();exitCp();
  for(var i=0;i<dates.length;i++){var ev2={};for(var p2 in data)ev2[p2]=data[p2];ev2.date=dates[i];fbSave(ev2);}
}

// User + log
var lastRead=parseInt(localStorage.getItem('fam_lr')||'0',10);
function initUser(){
  var s=localStorage.getItem('fam_un');
  if(s){userName=s;chkUnread();return;}
  if(!localStorage.getItem('fam_lr'))localStorage.setItem('fam_lr',String(Date.now()));
  document.getElementById('nameOv').classList.add('open');
}
document.getElementById('nameSub').onclick=function(){
  var v=document.getElementById('nameIn').value.trim();
  if(!v){alert('\u540D\u524D\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044');return;}
  userName=v;localStorage.setItem('fam_un',v);
  document.getElementById('nameOv').classList.remove('open');chkUnread();
};
document.getElementById('nameIn').addEventListener('keydown',function(e){if(e.keyCode===13)document.getElementById('nameSub').onclick();});

function saveLog(op,title,date){
  if(!userName)return;
  var log={who:userName,op:op,title:title,date:date||'',ts:Date.now()};
  fetch(FB_LOG+'.json?auth='+FB_KEY,{method:'POST',body:JSON.stringify(log)}).catch(function(){});
  var loc=JSON.parse(localStorage.getItem('fam_logs')||'[]');
  loc.unshift(log);if(loc.length>50)loc=loc.slice(0,50);
  localStorage.setItem('fam_logs',JSON.stringify(loc));
}
function chkUnread(){
  if(!userName)return;
  var lr=parseInt(localStorage.getItem('fam_lr')||'0',10);
  fetch(FB_LOG+'.json?auth='+FB_KEY,{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data){updBadge(0);return;}
      var ks=Object.keys(data),cnt=0;
      for(var i=0;i<ks.length;i++){
        var l=data[ks[i]];
        if(l&&l.who&&l.who!==userName&&l.ts&&l.ts>lr)cnt++;
      }
      updBadge(cnt);
    }).catch(function(){});
}
function updBadge(n){
  var b=document.getElementById('hBadge');
  if(n>0){b.textContent=n>99?'99+':String(n);b.className='show';}else{b.className='';}
}

// \u30ED\u30B0\u3092Firebase\u304B\u3089\u500B\u5225\u524A\u9664
function delLogItem(fbKey,el){
  fetch(FB_LOG+'/'+fbKey+'.json?auth='+FB_KEY,{method:'DELETE'})
    .then(function(){
      if(el&&el.parentNode)el.parentNode.removeChild(el);
      // \u30D0\u30C3\u30B8\u518D\u30C1\u30A7\u30C3\u30AF
      chkUnread();
      // \u5168\u524A\u9664\u30DC\u30BF\u30F3\u306E\u8868\u793A\u66F4\u65B0
      var hl=document.getElementById('histList');
      if(!hl.children.length){
        hl.innerHTML='<div style="color:var(--tm);font-size:.82rem;padding:12px 0">\u5C65\u6B74\u304C\u3042\u308A\u307E\u305B\u3093</div>';
        document.getElementById('histAllChk').className='';
      }
    }).catch(function(){});
}

function openHist(){
  // \u30D0\u30C3\u30B8\u3092\u30EA\u30BB\u30C3\u30C8\u30FBlastRead\u3092\u66F4\u65B0
  localStorage.setItem('fam_lr',String(Date.now()));
  updBadge(0);
  var hl=document.getElementById('histList');
  var allBtn=document.getElementById('histAllChk');
  hl.innerHTML='\u8AAD\u307F\u8FBC\u307F\u4E2D\u2026';
  allBtn.className='';
  var lr=parseInt(localStorage.getItem('fam_lr')||'0',10);

  fetch(FB_LOG+'.json?auth='+FB_KEY,{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){
      var items=[];
      if(data){
        var ks=Object.keys(data);
        for(var i=0;i<ks.length;i++){
          var l=data[ks[i]];
          if(l&&l.who&&l.who!=='?'&&l.who!==''){
            var o={};for(var p in l)o[p]=l[p];
            o._fbKey=ks[i];
            items.push(o);
          }
        }
      }
      items.sort(function(a,b){return b.ts-a.ts;});
      hl.innerHTML='';
      if(!items.length){
        hl.innerHTML='<div style="color:var(--tm);font-size:.82rem;padding:12px 0">\u5C65\u6B74\u304C\u3042\u308A\u307E\u305B\u3093</div>';
        return;
      }

      // \u672A\u8AAD\u4EF6\u6570(\u81EA\u5206\u4EE5\u5916\u30FB\u4ECA\u56DEopenHist\u3092\u547C\u3076\u524D\u306ElastRead\u57FA\u6E96)
      var prevLr=parseInt(localStorage.getItem('fam_lr_prev')||'0',10);
      var hasUnread=false;

      for(var j=0;j<items.length;j++){
        (function(log){
          var isUnread=(log.who!==userName&&log.ts&&log.ts>prevLr);
          if(isUnread)hasUnread=true;
          var it=document.createElement('div');
          it.className='hitem'+(isUnread?' unread':'');
          var opc=log.op==='\u8FFD\u52A0'?'hadd':log.op==='\u7DE8\u96C6'?'hedit':'hdel';
          var dt=log.ts?fmtLog(log.ts):'';
          var badge=isUnread?'<span style="font-size:.65rem;background:var(--ac);color:#fff;border-radius:4px;padding:1px 5px;margin-left:4px">NEW</span>':'';

          var body=document.createElement('div');body.style.flex='1';body.style.minWidth='0';
          body.innerHTML='<div class="hwho">'+esc(log.who||'?')+'</div>'+
            '<div class="hbody"><div class="htit"><span class="'+opc+'">'+esc(log.op)+'</span> '+esc(log.title||'')+badge+'</div>'+
            '<div class="hmeta">'+(log.date?esc(log.date)+' &middot; ':'')+dt+'</div></div>';
          it.appendChild(body);

          // \u78BA\u8A8D\u6E08\u307F\u30DC\u30BF\u30F3
          var chkBtn=document.createElement('button');
          chkBtn.className='hchk';
          chkBtn.textContent='\u78BA\u8A8D\u6E08';
          (function(el,fbk){
            chkBtn.onclick=function(){delLogItem(fbk,el);};
          })(it,log._fbKey);
          it.appendChild(chkBtn);

          hl.appendChild(it);
        })(items[j]);
      }

      // \u5168\u3066\u78BA\u8A8D\u6E08\u307F\u30DC\u30BF\u30F3\u8868\u793A
      if(items.length>0){
        allBtn.className='show';
        allBtn.onclick=function(){
          var its=document.querySelectorAll('.hitem');
          var fbKeys=[];
          for(var k=0;k<its.length;k++){
            var btn=its[k].querySelector('.hchk');
            if(btn){
              // fbKey\u306Fclosure\u3067\u6301\u3063\u3066\u3044\u308B\u306E\u3067\u5168\u524A\u9664
            }
          }
          // \u5168\u4EF6\u3092Firebase\u304B\u3089\u524A\u9664
          fetch(FB_LOG+'.json?auth='+FB_KEY,{cache:'no-store'})
            .then(function(r){return r.json();})
            .then(function(d){
              if(!d)return;
              var allKeys=Object.keys(d);
              for(var ai=0;ai<allKeys.length;ai++){
                fetch(FB_LOG+'/'+allKeys[ai]+'.json?auth='+FB_KEY,{method:'DELETE'}).catch(function(){});
              }
              hl.innerHTML='<div style="color:var(--tm);font-size:.82rem;padding:12px 0">\u5C65\u6B74\u304C\u3042\u308A\u307E\u305B\u3093</div>';
              allBtn.className='';
              updBadge(0);
              localStorage.removeItem('fam_logs');
            }).catch(function(){});
        };
      }

      // \u4ECA\u56DE\u306ElastRead\u3092\u4FDD\u5B58\uFF08\u6B21\u56DEopenHist\u6642\u306E\u672A\u8AAD\u5224\u5B9A\u7528\uFF09
      localStorage.setItem('fam_lr_prev',String(Date.now()));
    })
    .catch(function(){
      hl.innerHTML='<div style="color:var(--tm);font-size:.82rem;padding:12px 0">\u53D6\u5F97\u5931\u6557</div>';
    });
  document.getElementById('histOv').classList.add('open');
}
function fmtLog(ts){
  var d=new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+'('+DN[d.getDay()]+') '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Time input
function stm(el){
  el.addEventListener('input',function(){var r=this.value.replace(/\D/g,'');if(!r){this.value='';return;}if(r.length>4)r=r.slice(0,4);this.value=r.length>=3?r.slice(0,2)+':'+r.slice(2):r;});
  el.addEventListener('blur',function(){var m=this.value.match(/^(\d{1,2})(?::(\d{0,2}))?$/);if(m)this.value=(m[1].length<2?'0'+m[1]:m[1])+':'+(m[2]?m[2].length<2?m[2]+'0':m[2]:'00');});
}
stm(document.getElementById('fTs'));stm(document.getElementById('fTe'));

// Swipe horizontal calendar
(function(){
  var w=document.getElementById('cWrap');var sx=0,sy=0,mv=false;
  w.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;mv=false;},{passive:true});
  w.addEventListener('touchmove',function(e){var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)mv=true;},{passive:true});
  w.addEventListener('touchend',function(e){if(!mv)return;var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){if(dx<0){curM++;if(curM>11){curM=0;curY++;}}else{curM--;if(curM<0){curM=11;curY--;}}render();}},{passive:true});
})();

// Swipe down close modals
(function(){
  var ovs=['evOv','setOv','dayOv','histOv'];
  for(var ii=0;ii<ovs.length;ii++){
    (function(oid){
      var ov=document.getElementById(oid),modal=ov.querySelector('.modal'),handle=modal.querySelector('.mh');
      var sy=0,drag=false;
      function closeThis(){modal.style.transform='translateY(100%)';modal.style.transition='transform .25s ease';setTimeout(function(){modal.style.transform='';modal.style.transition='';if(oid==='evOv')closeModal();else if(oid==='dayOv')closeDay();else ov.classList.remove('open');},220);}
      function onS(y){sy=y;drag=true;modal.style.transition='none';}
      function onM(y){if(!drag)return;var dy=y-sy;if(dy>0)modal.style.transform='translateY('+dy+'px)';}
      function onE(y){if(!drag)return;drag=false;var dy=y-sy;if(dy>60)closeThis();else{modal.style.transition='transform .25s ease';modal.style.transform='';}}
      handle.addEventListener('touchstart',function(e){onS(e.touches[0].clientY);},{passive:true});
      handle.addEventListener('touchmove',function(e){onM(e.touches[0].clientY);},{passive:true});
      handle.addEventListener('touchend',function(e){onE(e.changedTouches[0].clientY);},{passive:true});
      var sc=false;
      document.addEventListener('touchstart',function(e){if(!ov.classList.contains('open'))return;sc=e.touches[0].clientY<=30;if(sc)onS(e.touches[0].clientY);},{passive:true});
      document.addEventListener('touchmove',function(e){if(sc)onM(e.touches[0].clientY);},{passive:true});
      document.addEventListener('touchend',function(e){if(sc){sc=false;onE(e.changedTouches[0].clientY);}},{passive:true});
    })(ovs[ii]);
  }
})();
