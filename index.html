<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="&#x5BB6;&#x65CF;&#x30AB;&#x30EC;&#x30F3;&#x30C0;&#x30FC;">
<meta name="theme-color" content="#5b8dee">
<title>&#x5BB6;&#x65CF;&#x30AB;&#x30EC;&#x30F3;&#x30C0;&#x30FC;</title>
<style>
:root{
  --bg:#fdf6ee;--surface:#fff9f3;--border:#f0e0cc;
  --text:#3d2b1f;--text-muted:#a07858;
  --accent:#e8724a;--al:#fde8df;
  --c0:#5b8dee;--c0l:#dce9fd;
  --c1:#e86fa0;--c1l:#fde0ec;
  --c2:#f4a431;--c2l:#fef3dc;
  --c3:#a066cc;--c3l:#f0e4fa;
  --c4:#52b788;--c4l:#d8f3e5;
  --shadow:0 2px 12px rgba(61,43,31,.08);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,Hiragino Sans,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:calc(80px + var(--safe-b));}
#syncBar{display:none;position:fixed;top:0;left:0;right:0;z-index:300;background:var(--accent);color:#fff;font-size:.74rem;font-weight:700;text-align:center;padding:4px;}
#syncBar.show{display:block;}
#statusMsg{display:none;text-align:center;padding:5px;font-size:.74rem;color:var(--text-muted);background:var(--surface);border-bottom:1px solid var(--border);}
#statusMsg.show{display:block;}
header{background:var(--surface);border-bottom:2px solid var(--border);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.logo{font-size:1.1rem;font-weight:700;}
.logo span{color:var(--accent);}
.nav-month{display:flex;align-items:center;gap:6px;}
.nav-month button{background:none;border:2px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;}
.nav-month button:active{background:var(--al);}
#monthLabel{font-weight:700;font-size:.95rem;min-width:80px;text-align:center;}
.btn-settings{background:none;border:2px solid var(--border);border-radius:99px;padding:5px 10px;font-size:.95rem;cursor:pointer;}
.legend{display:flex;gap:8px;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;}
.dot{width:8px;height:8px;border-radius:50%;}
.calendar-wrap{padding:6px;overflow-x:hidden;}
.grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:auto;gap:3px;align-items:stretch;width:100%;min-width:0;}
.day-header{text-align:center;font-size:.70rem;font-weight:700;color:var(--text-muted);padding:2px 0 4px;min-width:0;}
.day-header.sun{color:#e05a5a;}.day-header.sat{color:#5b8dee;}
.cell{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:3px 2px 2px;cursor:pointer;position:relative;min-width:0;overflow:hidden;min-height:52px;}
.cell:active{background:var(--al);}
.cell.other-month{opacity:.35;background:transparent;border-color:transparent;}
.cell.next-preview{opacity:.55;background:var(--bg);border-color:var(--border);}
.cell.today{border-color:var(--accent);background:var(--al);}
.cell.copy-sel{border-color:var(--accent);border-width:2px;background:var(--al);box-shadow:0 0 0 2px var(--accent);}
.cell-date{font-size:.67rem;font-weight:700;margin-bottom:1px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cell.today .cell-date{background:var(--accent);color:#fff;}
.holiday-name{font-size:.48rem;color:#e05a5a;opacity:.7;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;font-weight:600;}
.event-chip{font-weight:700;border-radius:3px;padding:1px 2px;margin-bottom:1px;cursor:pointer;display:block;max-width:100%;overflow:hidden;line-height:1.2;}
.chip-title{display:block;line-height:1.2;font-weight:700;word-break:break-all;}
.chip-title.short{white-space:nowrap;overflow:hidden;word-break:normal;}
.chip-time{display:block;opacity:.8;white-space:nowrap;font-weight:500;line-height:1.15;}
@media(min-width:480px){
  .calendar-wrap{padding:14px;}.grid{gap:4px;}
  .cell{border-radius:12px;padding:6px 5px 5px;min-height:72px;}
  .cell-date{font-size:.8rem;width:22px;height:22px;margin-bottom:3px;}
  .day-header{font-size:.78rem;padding:4px 0 6px;}
  .event-chip{border-radius:5px;padding:2px 4px;margin-bottom:2px;}
  .holiday-name{font-size:.58rem;}
}
.fab{position:fixed;bottom:calc(16px + var(--safe-b));right:16px;z-index:150;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.7rem;cursor:pointer;box-shadow:0 4px 18px rgba(232,114,74,.45);display:flex;align-items:center;justify-content:center;}
.fab:active{transform:scale(.9);}
.upcoming{padding:0 8px 8px;}
.upcoming h3{font-size:.83rem;font-weight:700;color:var(--text-muted);margin-bottom:8px;padding:0 4px;}
.upcoming-item{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px;cursor:pointer;}
.upcoming-date{font-size:.73rem;font-weight:700;color:var(--text-muted);min-width:42px;}
.upcoming-title{font-size:.86rem;font-weight:700;flex:1;min-width:0;}
.upcoming-bar{width:4px;height:32px;border-radius:4px;flex-shrink:0;}
#upcomingMore{display:none;width:100%;background:none;border:1.5px dashed var(--border);border-radius:12px;padding:10px;font-family:inherit;font-size:.82rem;font-weight:700;color:var(--text-muted);cursor:pointer;margin-bottom:6px;text-align:center;}
#upcomingMore.show{display:block;}
#upcomingExtra{display:none;}
#upcomingExtra.show{display:block;}
#copyBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:250;background:#1a1a2e;color:#fff;padding:10px 16px;flex-direction:column;gap:6px;}
#copyBanner.show{display:flex;}
.cb-top{display:flex;align-items:center;justify-content:space-between;}
.cb-title{font-size:.85rem;font-weight:700;}
.cb-sub{font-size:.75rem;opacity:.8;margin-top:2px;}
.cb-btns{display:flex;gap:8px;}
.btn-cx{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;}
.btn-cc{background:none;border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:7px 12px;font-family:inherit;font-size:.85rem;cursor:pointer;}
.overlay{display:none;position:fixed;inset:0;background:rgba(61,43,31,.4);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:22px 22px 0 0;padding:16px 18px calc(20px + var(--safe-b));width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(61,43,31,.18);transition:transform .25s ease;}
.modal-handle{width:38px;height:4px;border-radius:99px;background:var(--border);margin:0 auto 14px;padding:12px 24px;background-clip:content-box;cursor:grab;}
.modal h2{font-size:1.05rem;margin-bottom:14px;}
.form-group{margin-bottom:11px;}
.form-group label{display:block;font-size:.78rem;font-weight:700;margin-bottom:4px;color:var(--text-muted);}
.form-group input,.form-group select,.form-group textarea{width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-size:1rem;font-family:inherit;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:52px;}
.who-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.who-btn{padding:9px 4px;border-radius:10px;border:2px solid var(--border);cursor:pointer;font-family:inherit;font-size:.80rem;font-weight:700;background:var(--bg);color:var(--text);text-align:center;}
.modal-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn-save{flex:1;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;min-width:100px;}
.btn-cancel{background:var(--bg);border:2px solid var(--border);border-radius:12px;padding:13px 15px;font-family:inherit;font-size:.93rem;cursor:pointer;}
.btn-delete{background:none;border:2px solid #e05a5a;color:#e05a5a;border-radius:12px;padding:13px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;}
.btn-copy{background:none;border:2px solid var(--c0);color:var(--c0);border-radius:12px;padding:13px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.day-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.day-detail-header h2{font-size:1.05rem;margin:0;}
.btn-day-add{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(232,114,74,.4);flex-shrink:0;}
.day-event-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;cursor:pointer;}
.day-event-bar{width:4px;border-radius:4px;align-self:stretch;flex-shrink:0;min-height:32px;}
.day-event-body{flex:1;min-width:0;}
.day-event-title{font-size:.93rem;font-weight:700;}
.day-event-time{font-size:.75rem;color:var(--text-muted);margin-top:2px;}
.day-event-who{font-size:.70rem;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.day-empty{text-align:center;padding:28px 0;color:var(--text-muted);font-size:.85rem;}
.setting-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.setting-row label{font-size:.83rem;font-weight:700;color:var(--text-muted);width:48px;}
.setting-row input[type=text]{flex:1;border:2px solid var(--border);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:.93rem;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.setting-row input[type=color]{width:40px;height:38px;border:2px solid var(--border);border-radius:10px;cursor:pointer;padding:2px;background:var(--bg);}
#iosBanner{display:none;position:fixed;bottom:calc(76px + var(--safe-b));left:12px;right:12px;z-index:160;background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:0 8px 28px rgba(61,43,31,.14);}
#iosBanner.show{display:block;}
.ios-close{float:right;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text-muted);}
.ios-steps{font-size:.80rem;color:var(--text-muted);margin-top:8px;line-height:1.75;}
</style>
</head>

<script>

var FB_URL='https://family-calendar-ee093-default-rtdb.firebaseio.com/events';
var FB_KEY='AIzaSyDeXIUw4alDboi0Z-P2s2HDKKKdTAgdZcg';
var useFirebase=false;
var today=new Date();
var currentYear=today.getFullYear(),currentMonth=today.getMonth();
var events={};
var editingKey=null,selectedWho='kazoku';
var copyMode=false,copySourceKey=null,copyDates=[];
var fbPollTimer=null;

var MEMBER_IDS  =['papa','mama','son1','son2','kazoku'];
var MEMBER_EMOJI=['\u{1F468}','\u{1F469}','\u{1F466}','\u{1F476}','\u{1F3E0}'];
var MEMBER_LABEL=[null,null,null,null,null]; // loaded from localStorage or defaults
var MEMBER_DEF_LABEL=['\u30D1\u30D1','\u30DE\u30DE','\u9577\u7537','\u6B21\u7537','\u5BB6\u65CF\u5168\u54E1'];
var MEMBER_COLOR=['#5b8dee','#e86fa0','#f4a431','#a066cc','#52b788'];
var MEMBER_LIGHT=['#dce9fd','#fde0ec','#fef3dc','#f0e4fa','#d8f3e5'];

function loadMembers(){
  var saved=localStorage.getItem('fam_members2');
  if(saved){
    try{
      var arr=JSON.parse(saved);
      for(var i=0;i<arr.length;i++){
        if(arr[i]){
          if(arr[i].label)MEMBER_LABEL[i]=arr[i].label;
          if(arr[i].color)MEMBER_COLOR[i]=arr[i].color;
          if(arr[i].light)MEMBER_LIGHT[i]=arr[i].light;
        }
      }
    }catch(e){}
  }
  for(var j=0;j<MEMBER_IDS.length;j++){
    if(!MEMBER_LABEL[j])MEMBER_LABEL[j]=MEMBER_DEF_LABEL[j];
  }
}
function saveMembers(){
  var arr=[];
  for(var i=0;i<MEMBER_IDS.length;i++){
    arr.push({label:MEMBER_LABEL[i],color:MEMBER_COLOR[i],light:MEMBER_LIGHT[i]});
  }
  localStorage.setItem('fam_members2',JSON.stringify(arr));
}
function getMemberIdx(id){
  for(var i=0;i<MEMBER_IDS.length;i++){if(MEMBER_IDS[i]===id)return i;}
  return -1;
}
function getMember(id){
  var i=getMemberIdx(id);
  if(i<0)return {color:'#999',light:'#eee',label:id,emoji:''};
  return {color:MEMBER_COLOR[i],light:MEMBER_LIGHT[i],label:MEMBER_LABEL[i],emoji:MEMBER_EMOJI[i]};
}

function pad(n){var s=String(n);return s.length<2?'0'+s:s;}
function toDS(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
var syncBar=document.getElementById('syncBar');
var statusMsg=document.getElementById('statusMsg');
function showStatus(msg){statusMsg.textContent=msg;statusMsg.classList.add('show');setTimeout(function(){statusMsg.classList.remove('show');},3000);}
function lsLoad(){var s=localStorage.getItem('fam_events_v2');events=s?JSON.parse(s):{};render();}
function lsSave(){localStorage.setItem('fam_events_v2',JSON.stringify(events));}

function fbFetch(){
  fetch(FB_URL+'.json?auth='+FB_KEY,{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){events=data||{};lsSave();render();useFirebase=true;})
    .catch(function(){if(!useFirebase){lsLoad();}});
}
function saveToBackend(ev){
  var k=ev._key,data=Object.assign({},ev);delete data._key;
  var lk=k||('ev_'+Date.now()+'_'+Math.random().toString(36).slice(2));
  events[lk]=data;lsSave();render();
  syncBar.classList.add('show');
  var url=k?(FB_URL+'/'+k+'.json?auth='+FB_KEY):(FB_URL+'.json?auth='+FB_KEY);
  fetch(url,{method:k?'PUT':'POST',body:JSON.stringify(data)})
    .then(function(r){return r.json();})
    .then(function(res){
      if(!k&&res&&res.name&&res.name!==lk){events[res.name]=events[lk];delete events[lk];lsSave();}
      syncBar.classList.remove('show');
    })
    .catch(function(){syncBar.classList.remove('show');});
}
function deleteFromBackend(key){
  delete events[key];lsSave();render();
  fetch(FB_URL+'/'+key+'.json?auth='+FB_KEY,{method:'DELETE'}).catch(function(){});
}

// Holidays (keys are ASCII date strings, values are escaped unicode)
var HOLIDAYS={
  '2025-01-01':'\u5143\u65E5','2025-01-13':'\u6210\u4EBA\u306E\u65E5','2025-02-11':'\u5EFA\u56FD\u8A18\u5FF5\u306E\u65E5',
  '2025-02-23':'\u5929\u7687\u8A95\u751F\u65E5','2025-02-24':'\u5929\u7687\u8A95\u751F\u65E5 \u6B63\u632F',

function getVisibleEvents(year,month){
  var results=[];
  var dim=new Date(year,month+1,0).getDate();
  var keys=Object.keys(events);
  for(var k=0;k<keys.length;k++){
    var key=keys[k],ev=events[key];
    if(!ev||!ev.date)continue;
    var evDate=new Date(ev.date+'T00:00:00');
    var evD=evDate.getDate();
    var tag=Object.assign({},ev,{_key:key});
    if(!ev.repeat||ev.repeat==='none'){results.push(tag);}
    else if(ev.repeat==='weekly'){
      var dow=evDate.getDay();
      for(var d=1;d<=dim;d++){
        var cd=new Date(year,month,d);
        if(cd.getDay()===dow&&cd>=evDate)
          results.push(Object.assign({},tag,{date:year+'-'+pad(month+1)+'-'+pad(d)}));
      }
    }else if(ev.repeat==='monthly'&&evD<=dim){
      var td=new Date(year,month,evD);
      if(td>=evDate)results.push(Object.assign({},tag,{date:year+'-'+pad(month+1)+'-'+pad(evD)}));
    }
  }
  return results;
}

function render(){
  renderLegend();
  document.getElementById('monthLabel').textContent=currentYear+'\u5E74'+MONTH_NAMES[currentMonth];
  var grid=document.getElementById('calGrid');grid.innerHTML='';
  var first=new Date(currentYear,currentMonth,1).getDay();
  var days=new Date(currentYear,currentMonth+1,0).getDate();
  var prevDays=new Date(currentYear,currentMonth,0).getDate();
  var todayStr=toDS(today);
  var visible=getVisibleEvents(currentYear,currentMonth);
  var nextMo=currentMonth===11?0:currentMonth+1;
  var nextYr=currentMonth===11?currentYear+1:currentYear;
  var visibleNext=getVisibleEvents(nextYr,nextMo);
  var mobile=window.innerWidth<480;

  for(var hi=0;hi<7;hi++){
    var hd=document.createElement('div');
    hd.className='day-header'+(hi===0?' sun':hi===6?' sat':'');
    hd.textContent=DAY_NAMES[hi];grid.appendChild(hd);
  }

  for(var row=0;row<6;row++){
    for(var col=0;col<7;col++){
      var i=row*7+col;
      var cell=document.createElement('div');cell.className='cell';
      var d,dateStr,inMonth=true,isNext=false;
      if(i<first){
        d=prevDays-first+i+1;
        var pm=currentMonth===0?11:currentMonth-1,py=currentMonth===0?currentYear-1:currentYear;
        dateStr=py+'-'+pad(pm+1)+'-'+pad(d);inMonth=false;
      }else if(i-first>=days){
        d=i-first-days+1;dateStr=nextYr+'-'+pad(nextMo+1)+'-'+pad(d);inMonth=false;isNext=true;
      }else{d=i-first+1;dateStr=currentYear+'-'+pad(currentMonth+1)+'-'+pad(d);}

      if(!inMonth){cell.classList.add(isNext?'next-preview':'other-month');}
      if(dateStr===todayStr)cell.classList.add('today');
      if(copyMode&&copyDates.indexOf(dateStr)>=0)cell.classList.add('copy-sel');

      var dateEl=document.createElement('div');dateEl.className='cell-date';dateEl.textContent=d;
      var hol=getHoliday(dateStr);
      if(col===0||hol)dateEl.style.color='#e05a5a';

      cell.appendChild(dateEl);
      if(hol){var hlEl=document.createElement('div');hlEl.className='holiday-name';hlEl.textContent=hol;cell.appendChild(hlEl);}

      (function(ds){cell.onclick=function(){if(copyMode){toggleCopyDate(ds);return;}openDayDetail(ds);};})(dateStr);

      var src=isNext?visibleNext:visible;
      var dayEvts=[];
      for(var ei=0;ei<src.length;ei++){if(src[ei].date===dateStr)dayEvts.push(src[ei]);}
      dayEvts.sort(function(a,b){return getMemberIdx(a.who)-getMemberIdx(b.who);});

      for(var ei2=0;ei2<dayEvts.length;ei2++){
        (function(ev){

          var base=mobile?0.55:0.67;
          var tEl=document.createElement('div');tEl.className='chip-title';tEl.textContent=ev.title;
          var len=ev.title.length;
          if(len<=6){tEl.classList.add('short');var sc=len<=2?1:len<=3?0.92:len<=4?0.84:len<=5?0.76:0.68;tEl.style.fontSize=(base*sc)+'rem';}
          else{tEl.style.fontSize=(base*(len<=9?0.80:len<=12?0.70:0.60))+'rem';}
          chip.appendChild(tEl);
          if(ev.timeStart){
            var tStr=ev.timeStart+(ev.timeEnd?'\u2013'+ev.timeEnd:'');
            var tmEl=document.createElement('div');tmEl.className='chip-time';tmEl.textContent=tStr;
            var tb=mobile?0.46:0.56,tl=tStr.length;
            tmEl.style.fontSize=(tb*(tl<=5?1:tl<=8?0.88:tl<=11?0.76:0.65))+'rem';
            chip.appendChild(tmEl);
          }
          (function(ds){chip.onclick=function(e){e.stopPropagation();if(copyMode){toggleCopyDate(ds);return;}openDayDetail(ds);};})(dateStr);
          cell.appendChild(chip);

function renderUpcoming(){
  var list=document.getElementById('upcomingList');
  var extra=document.getElementById('upcomingExtra');
  var moreBtn=document.getElementById('upcomingMore');
  list.innerHTML='';extra.innerHTML='';
  extra.classList.remove('show');moreBtn.classList.remove('show');
  var upcoming=[];
  for(var i=0;i<60;i++){
    var d=new Date(today);d.setDate(today.getDate()+i);
    var ds=toDS(d);
    var evts=getVisibleEvents(d.getFullYear(),d.getMonth());
    for(var j=0;j<evts.length;j++){if(evts[j].date===ds)upcoming.push(Object.assign({},evts[j],{_ds:ds}));}
  }
  upcoming.sort(function(a,b){
    if(a._ds!==b._ds)return a._ds>b._ds?1:-1;
    return getMemberIdx(a.who)-getMemberIdx(b.who);
  });
  if(!upcoming.length){list.innerHTML='<div style="color:var(--text-muted);font-size:.80rem;padding:8px 4px">\u4E88\u5B9A\u304C\u3042\u308A\u307E\u305B\u3093</div>';return;}
  for(var i2=0;i2<Math.min(2,upcoming.length);i2++)list.appendChild(makeUpcomingItem(upcoming[i2]));
  if(upcoming.length>2){
    for(var i3=2;i3<upcoming.length;i3++)extra.appendChild(makeUpcomingItem(upcoming[i3]));
    moreBtn.textContent='\u25BC \u3082\u3063\u3068\u898B\u308B\uff08\u3042\u3068'+(upcoming.length-2)+'\u4EF6\uff09';
    moreBtn.classList.add('show');
    moreBtn.onclick=function(){extra.classList.add('show');moreBtn.classList.remove('show');};
  }
}

function fmtDate(ds){
  var p=ds.split('-');var y=parseInt(p[0]),m=parseInt(p[1]),d=parseInt(p[2]);
  var t=new Date();
  if(y===t.getFullYear()&&m===t.getMonth()+1&&d===t.getDate())return '\u4ECA\u65E5';
  return m+'/'+d+'('+DOW_NAMES[new Date(y,m-1,d).getDay()]+')';
}

function openDayDetail(dateStr){
  var p=dateStr.split('-');var y=parseInt(p[0]),m=parseInt(p[1]),d=parseInt(p[2]);
  var dow=DOW_NAMES[new Date(y,m-1,d).getDay()];
  var t=new Date();
  var label=(y===t.getFullYear()&&m===t.getMonth()+1&&d===t.getDate())?('\u4ECA\u65E5 '+m+'/'+d+'('+dow+')'):(m+'\u6708'+d+'\u65E5('+dow+')');
  document.getElementById('dayDetailTitle').textContent=label;
  var evts=getVisibleEvents(y,m-1);
  var dayEvts=[];
  for(var i=0;i<evts.length;i++){if(evts[i].date===dateStr)dayEvts.push(evts[i]);}
  dayEvts.sort(function(a,b){return getMemberIdx(a.who)-getMemberIdx(b.who);});
  var list=document.getElementById('dayEventList');list.innerHTML='';
  if(!dayEvts.length){list.innerHTML='<div class="day-empty">\u{1F4ED} \u3053\u306E\u65E5\u306E\u4E88\u5B9A\u306F\u3042\u308A\u307E\u305B\u3093</div>';
  }else{
    for(var j=0;j<dayEvts.length;j++){
      (function(ev){
        var mem=getMember(ev.who);
        var item=document.createElement('div');item.className='day-event-item';
        var ts=ev.timeStart?(ev.timeStart+(ev.timeEnd?'\u2013'+ev.timeEnd:'')):'';
        item.innerHTML='<div class="day-event-bar" style="background:'+mem.color+'"></div>'+
          '<div class="day-event-body"><div class="day-event-title">'+ev.title+'</div>'+
          (ts?'<div class="day-event-time">\u{1F550} '+ts+'</div>':'')+
          (ev.memo?'<div class="day-event-time">\u{1F4DD} '+ev.memo+'</div>':'')+'</div>'+
          '<div class="day-event-who" style="background:'+mem.light+';color:'+mem.color+'">'+mem.emoji+mem.label+'</div>';
        (function(k){item.onclick=function(){closeDayDetail();setTimeout(function(){openModal(k);},50);};})(ev._key);
        list.appendChild(item);
      })(dayEvts[j]);
    }
  }
  (function(ds){document.getElementById('dayAddBtn').onclick=function(){closeDayDetail();setTimeout(function(){openModal(null,ds);},50);};})(dateStr);
  document.getElementById('dayOverlay').classList.add('open');

function setupTime(el){
  el.addEventListener('input',function(){
    var r=this.value.replace(/\D/g,'');if(!r){this.value='';return;}
    if(r.length>4)r=r.slice(0,4);
    this.value=r.length>=3?r.slice(0,2)+':'+r.slice(2):r;
  });
  el.addEventListener('blur',function(){
    var m=this.value.match(/^(\d{1,2})(?::(\d{0,2}))?$/);
    if(m)this.value=(m[1].length<2?'0'+m[1]:m[1])+':'+(m[2]?m[2].length<2?m[2]+'0':m[2]:'00');
  });
}

      }
      function onS(y){sy=y;drag=true;modal.style.transition='none';}
      function onM(y){if(!drag)return;var dy=y-sy;if(dy>0)modal.style.transform='translateY('+dy+'px)';}
      function onE(y){if(!drag)return;drag=false;var dy=y-sy;if(dy>60)closeThis();else{modal.style.transition='transform .25s ease';modal.style.transform='';}}
      handle.addEventListener('touchstart',function(e){onS(e.touches[0].clientY);},{passive:true});
      handle.addEventListener('touchmove',function(e){onM(e.touches[0].clientY);},{passive:true});
      handle.addEventListener('touchend',function(e){onE(e.changedTouches[0].clientY);},{passive:true});
      var scr=false;
      document.addEventListener('touchstart',function(e){if(!ov.classList.contains('open'))return;scr=e.touches[0].clientY<=30;if(scr)onS(e.touches[0].clientY);},{passive:true});
      document.addEventListener('touchmove',function(e){if(scr)onM(e.touches[0].clientY);},{passive:true});
      document.addEventListener('touchend',function(e){if(scr){scr=false;onE(e.changedTouches[0].clientY);}},{passive:true});
    })(ids[ii]);
  }
})();
