<style>
:root{
  --bg:#fdf6ee;--surface:#fff9f3;--border:#f0e0cc;
  --text:#3d2b1f;--text-muted:#a07858;
  --accent:#e8724a;--accent-light:#fde8df;
  --papa:#5b8dee;--papa-light:#dce9fd;
  --mama:#e86fa0;--mama-light:#fde0ec;
  --kazoku:#52b788;--kazoku-light:#d8f3e5;
  --son1:#f4a431;--son1-light:#fef3dc;
  --son2:#a066cc;--son2-light:#f0e4fa;
  --shadow:0 2px 12px rgba(61,43,31,.08);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Zen Maru Gothic',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;overflow-x:hidden;
  padding-bottom:calc(80px + var(--safe-b));
}
#syncBar{
  display:none;position:fixed;top:0;left:0;right:0;z-index:300;
  background:var(--accent);color:#fff;font-size:.74rem;font-weight:700;
  text-align:center;padding:4px;
}
#syncBar.show{display:block;}
#statusMsg{
  display:none;text-align:center;padding:5px;font-size:.74rem;
  color:var(--text-muted);background:var(--surface);border-bottom:1px solid var(--border);
}
#statusMsg.show{display:block;}

/* header */
header{
  background:var(--surface);border-bottom:2px solid var(--border);
  padding:10px 12px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow);
}
.logo{font-size:1.05rem;font-weight:700;}
.logo span{color:var(--accent);}
.nav-month{display:flex;align-items:center;gap:6px;}
.nav-month button{
  background:none;border:2px solid var(--border);border-radius:50%;
  width:30px;height:30px;cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;
}
.nav-month button:active{background:var(--accent-light);}
#monthLabel{font-weight:700;font-size:.95rem;min-width:80px;text-align:center;}
.btn-settings{
  background:none;border:2px solid var(--border);border-radius:99px;
  padding:5px 10px;font-size:.95rem;cursor:pointer;
}
.btn-settings:active{background:var(--accent-light);}

/* legend */
.legend{
  display:flex;gap:8px;padding:6px 10px;
  border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;}
.dot{width:8px;height:8px;border-radius:50%;}

/* calendar wrap - swipe container */
.calendar-outer{overflow:hidden;position:relative;}
.calendar-wrap{
  padding:6px;touch-action:pan-y;user-select:none;
  transition:transform .25s ease;
}

/* grid */
.grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  grid-auto-rows:auto;gap:3px;align-items:stretch;width:100%;min-width:0;
}
.week-row{display:contents;}
.day-header{
  text-align:center;font-size:.70rem;font-weight:700;
  color:var(--text-muted);padding:2px 0 4px;min-width:0;
}
.day-header.sun{color:#e05a5a;}
.day-header.sat{color:var(--papa);}
.cell{
  background:var(--surface);border:1.5px solid var(--border);border-radius:7px;
  padding:3px 2px 2px;cursor:pointer;position:relative;min-width:0;overflow:hidden;
  transition:border-color .12s;
}
.cell:active{background:var(--accent-light);}
.cell.other-month{opacity:.35;background:transparent;border-color:transparent;}
/* 翌月プレビュー: 少し色を薄く */
.cell.next-month-preview{opacity:.55;background:var(--bg);border-color:var(--border);}
.cell.today{border-color:var(--accent);background:var(--accent-light);}

/* コピーモード: 選択中のセル */
.cell.copy-selected{
  border-color:var(--accent);border-width:2px;
  background:var(--accent-light);
  box-shadow:0 0 0 2px var(--accent);
}

.cell-date{
  font-size:.67rem;font-weight:700;margin-bottom:1px;
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;
}
.cell.today .cell-date{background:var(--accent);color:#fff;}
.event-chip{
  font-weight:700;border-radius:3px;padding:1px 2px;margin-bottom:1px;
  cursor:pointer;display:block;max-width:100%;overflow:hidden;line-height:1.2;
}
.chip-title{display:block;line-height:1.2;font-weight:700;word-break:break-all;}
.chip-title.short{white-space:nowrap;overflow:hidden;word-break:normal;}
.chip-time{display:block;opacity:.8;white-space:nowrap;font-weight:500;line-height:1.15;}

@media(min-width:390px){
  .cell{border-radius:9px;padding:4px 3px 3px;}
  .cell-date{font-size:.70rem;width:17px;height:17px;}
}
@media(min-width:480px){
  .calendar-wrap{padding:14px;}
  .grid{gap:4px;}
  .cell{border-radius:12px;padding:6px 5px 5px;}
  .cell-date{font-size:.8rem;width:22px;height:22px;margin-bottom:3px;}
  .day-header{font-size:.78rem;padding:4px 0 6px;}
  .event-chip{border-radius:5px;padding:2px 4px;margin-bottom:2px;}
}

/* FAB */
.fab{
  position:fixed;bottom:calc(16px + var(--safe-b));right:16px;z-index:150;
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;
  font-size:1.7rem;cursor:pointer;
  box-shadow:0 4px 18px rgba(232,114,74,.45);
  display:flex;align-items:center;justify-content:center;
}
.fab:active{transform:scale(.9);}

/* upcoming */
.upcoming{padding:0 8px 8px;}
.upcoming h3{font-size:.83rem;font-weight:700;color:var(--text-muted);margin-bottom:8px;padding:0 4px;}
.upcoming-item{
  background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  padding:10px 12px;margin-bottom:6px;
  display:flex;align-items:center;gap:9px;cursor:pointer;
}
.upcoming-item:active{box-shadow:var(--shadow);}
.upcoming-date{font-size:.73rem;font-weight:700;color:var(--text-muted);min-width:42px;}
.upcoming-title{font-size:.86rem;font-weight:700;flex:1;min-width:0;}
.upcoming-bar{width:4px;height:32px;border-radius:4px;flex-shrink:0;}

/* day detail sheet */
.day-detail-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
}
.day-detail-header h2{font-size:1.05rem;margin:0;}
.btn-day-add{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;
  font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(232,114,74,.4);
  flex-shrink:0;
}
.day-event-item{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;padding:11px 13px;margin-bottom:8px;
  cursor:pointer;
}
.day-event-item:active{opacity:.8;}
.day-event-bar{width:4px;border-radius:4px;align-self:stretch;flex-shrink:0;min-height:32px;}
.day-event-body{flex:1;min-width:0;}
.day-event-title{font-size:.93rem;font-weight:700;}
.day-event-time{font-size:.75rem;color:var(--text-muted);margin-top:2px;}
.day-event-who{
  font-size:.70rem;font-weight:700;padding:2px 6px;
  border-radius:5px;white-space:nowrap;flex-shrink:0;
}
.day-empty{
  text-align:center;padding:28px 0;
  color:var(--text-muted);font-size:.85rem;
}

/* overlay / bottom sheet */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(61,43,31,.4);backdrop-filter:blur(3px);
  z-index:200;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex;}
.modal{
  background:var(--surface);border-radius:22px 22px 0 0;
  padding:16px 18px calc(20px + var(--safe-b));
  width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(61,43,31,.18);
  animation:slideUp .2s ease;
  transition:transform .25s ease;
  will-change:transform;
}
@keyframes slideUp{
  from{transform:translateY(60px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}
.modal-handle{
  width:38px;height:4px;border-radius:99px;
  background:var(--border);margin:0 auto 14px;
  /* タッチ領域を広げる */
  padding:12px 24px;
  background-clip:content-box;
  cursor:grab;
}
.modal h2{font-size:1.05rem;margin-bottom:14px;}
.form-group{margin-bottom:11px;}
.form-group label{display:block;font-size:.78rem;font-weight:700;margin-bottom:4px;color:var(--text-muted);}
.form-group input,.form-group select,.form-group textarea{
  width:100%;border:2px solid var(--border);border-radius:10px;
  padding:10px 12px;font-size:1rem;font-family:inherit;
  background:var(--bg);color:var(--text);outline:none;
  -webkit-appearance:none;transition:border-color .12s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:52px;}
.who-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.who-btn{
  padding:9px 4px;border-radius:10px;border:2px solid var(--border);
  cursor:pointer;font-family:inherit;font-size:.80rem;font-weight:700;
  background:var(--bg);color:var(--text);text-align:center;
}
.who-btn.selected-papa  {background:var(--papa-light);  border-color:var(--papa);  color:var(--papa);}
.who-btn.selected-mama  {background:var(--mama-light);  border-color:var(--mama);  color:var(--mama);}
.who-btn.selected-kazoku{background:var(--kazoku-light);border-color:var(--kazoku);color:var(--kazoku);}
.who-btn.selected-son1  {background:var(--son1-light);  border-color:var(--son1);  color:var(--son1);}
.who-btn.selected-son2  {background:var(--son2-light);  border-color:var(--son2);  color:var(--son2);}
.modal-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn-save{
  flex:1;background:var(--accent);color:#fff;border:none;
  border-radius:12px;padding:13px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;
  min-width:100px;
}
.btn-cancel{
  background:var(--bg);border:2px solid var(--border);border-radius:12px;
  padding:13px 15px;font-family:inherit;font-size:.93rem;cursor:pointer;
}
.btn-delete{
  background:none;border:2px solid #e05a5a;color:#e05a5a;
  border-radius:12px;padding:13px;
  font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;
}
.btn-copy{
  background:none;border:2px solid var(--papa);color:var(--papa);
  border-radius:12px;padding:13px;
  font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;
  width:100%;margin-top:0;
}

/* コピーモードバナー */
#copyBanner{
  display:none;position:fixed;top:0;left:0;right:0;z-index:250;
  background:#1a1a2e;color:#fff;padding:10px 16px;
  flex-direction:column;gap:6px;
}
#copyBanner.show{display:flex;}
.copy-banner-top{display:flex;align-items:center;justify-content:space-between;}
.copy-banner-title{font-size:.85rem;font-weight:700;}
.copy-banner-sub{font-size:.75rem;opacity:.8;margin-top:2px;}
.copy-banner-btns{display:flex;gap:8px;}
.btn-copy-exec{
  background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;
}
.btn-copy-cancel{
  background:none;border:2px solid rgba(255,255,255,.4);color:#fff;
  border-radius:8px;padding:7px 12px;font-family:inherit;font-size:.85rem;cursor:pointer;
}

/* settings */
.setting-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.setting-row label{font-size:.83rem;font-weight:700;color:var(--text-muted);width:48px;}
.setting-row input[type=text]{
  flex:1;border:2px solid var(--border);border-radius:10px;
  padding:8px 10px;font-family:inherit;font-size:.93rem;
  background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;
}
.setting-row input[type=color]{
  width:40px;height:38px;border:2px solid var(--border);
  border-radius:10px;cursor:pointer;padding:2px;background:var(--bg);
}

/* iOS / install banners */
#iosBanner,#installBanner{
  display:none;position:fixed;
  bottom:calc(76px + var(--safe-b));left:12px;right:12px;z-index:160;
  background:var(--surface);border:2px solid var(--border);border-radius:16px;
  padding:14px 16px;box-shadow:0 8px 28px rgba(61,43,31,.14);
}
#iosBanner.show,#installBanner.show{display:block;}
.ios-close{float:right;background:none;border:none;font-size:1rem;cursor:pointer;color:var(--text-muted);}
.ios-steps{font-size:.80rem;color:var(--text-muted);margin-top:8px;line-height:1.75;}
.install-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.install-btns{display:flex;gap:8px;}
.btn-install-main{
  flex:1;background:var(--accent);color:#fff;border:none;
  border-radius:10px;padding:10px;font-family:inherit;font-size:.86rem;font-weight:700;cursor:pointer;
}
.btn-install-sub{
  background:none;border:2px solid var(--border);border-radius:10px;
  padding:10px 13px;font-family:inherit;font-size:.86rem;cursor:pointer;
}
</style>
</head>
<body>

<div id="syncBar">🔄 同期中…</div>
<div id="statusMsg"></div>

<!-- コピーモードバナー -->
<div id="copyBanner">
  <div class="copy-banner-top">
    <div>
      <div class="copy-banner-title">📋 <span id="copyEventTitle"></span> をコピー</div>
      <div class="copy-banner-sub">コピー先の日付をタップ（複数選択可）</div>
    </div>
    <div class="copy-banner-btns">
      <button class="btn-copy-cancel" id="copyCancelBtn">キャンセル</button>
      <button class="btn-copy-exec" id="copyExecBtn">コピー (<span id="copyCount">0</span>日)</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">🐧 <span>家族</span>カレンダー</div>
  <div class="nav-month">
    <button id="prevBtn">‹</button>
    <span id="monthLabel"></span>
    <button id="nextBtn">›</button>
  </div>
  <button class="btn-settings" id="settingsBtn">⚙️</button>
</header>

<div class="legend" id="legend"></div>
<div class="calendar-outer" id="calOuter">
  <div class="calendar-wrap" id="calWrap">
    <div class="grid" id="calGrid"></div>
  </div>
</div>
<div class="upcoming">
  <h3>📋 今後の予定</h3>
  <div id="upcomingList"></div>
</div>

<button class="fab" id="fabBtn">＋</button>

<!-- iOS hint -->
<div id="iosBanner">
  <button class="ios-close" id="iosClose">✕</button>
  <strong style="font-size:.88rem">📱 ホーム画面への追加方法</strong>
  <div class="ios-steps">
    1. Safari 下部の <strong>共有ボタン（□↑）</strong> をタップ<br>
    2.「<strong>ホーム画面に追加</strong>」を選ぶ<br>
    3.「追加」で完了！
  </div>
</div>

<!-- Android install -->
<div id="installBanner">
  <div class="install-row">
    <span style="font-size:1.6rem">🐧</span>
    <div>
      <strong style="display:block;font-size:.9rem">ホーム画面に追加</strong>
      <span style="font-size:.75rem;color:var(--text-muted)">アプリとして使えます</span>
    </div>
  </div>
  <div class="install-btns">
    <button class="btn-install-sub" id="installDismiss">あとで</button>
    <button class="btn-install-main" id="installBtn">追加する</button>
  </div>
</div>

<!-- Day Detail Modal -->
<div class="overlay" id="dayOverlay">
  <div class="modal" id="dayModal">
    <div class="modal-handle"></div>
    <div class="day-detail-header">
      <h2 id="dayDetailTitle"></h2>
      <button class="btn-day-add" id="dayAddBtn">＋</button>
    </div>
    <div id="dayEventList"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>⚙️ メンバー設定</h2>
    <div id="settingRows"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="settingsCancelBtn">キャンセル</button>
      <button class="btn-save" id="settingsSaveBtn">保存</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">予定を追加</h2>
    <div class="form-group">
      <label>タイトル</label>
      <input type="text" id="fTitle" placeholder="例）保育園の発表会">
    </div>
    <div class="form-group">
      <label>日付</label>
      <input type="date" id="fDate">
    </div>
    <div class="form-group">
      <label>時間（任意）</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="text" id="fTimeStart" placeholder="9:00" style="flex:1" inputmode="numeric">
        <span style="color:var(--text-muted);white-space:nowrap">〜</span>
        <input type="text" id="fTimeEnd" placeholder="10:30" style="flex:1" inputmode="numeric">
      </div>
    </div>
    <div class="form-group">
      <label>だれの予定？</label>
      <div class="who-btns" id="whoBtns"></div>
    </div>
    <div class="form-group">
      <label>繰り返し</label>
      <select id="fRepeat">
        <option value="none">なし</option>
        <option value="weekly">毎週</option>
        <option value="monthly">毎月</option>
      </select>

<script>
// ─── Firebase ───────────────────────────────────────────
const firebaseConfig = {

  authDomain:"family-calendar-ee093.firebaseapp.com",

try{

// ─── State ──────────────────────────────────────────────
const today=new Date();
let currentYear=today.getFullYear(),currentMonth=today.getMonth();
let events={};
let editingKey=null,selectedWho='kazoku';

// コピーモード
let copyMode=false,copySourceKey=null,copyDates=new Set();

let members=JSON.parse(localStorage.getItem('fam_members')||'null')||[
  {id:'papa',  emoji:'👨',label:'パパ',   color:'#5b8dee',light:'#dce9fd'},

];

const pad=n=>String(n).padStart(2,'0');
const toDS=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const getMember=id=>members.find(m=>m.id===id)||{color:'#999',light:'#eee',label:id,emoji:''};
const saveMembers=()=>localStorage.setItem('fam_members',JSON.stringify(members));
const syncBar=document.getElementById('syncBar');
const statusMsg=document.getElementById('statusMsg');
function showStatus(msg){statusMsg.textContent=msg;statusMsg.classList.add('show');setTimeout(()=>statusMsg.classList.remove('show'),3000);}

// ─── Backend ────────────────────────────────────────────
function lsLoad(){events=JSON.parse(localStorage.getItem('fam_events_v2')||'{}');render();}
function lsSave(){localStorage.setItem('fam_events_v2',JSON.stringify(events));}

if(useFirebase){
  eventsRef.on('value',snap=>{events=snap.val()||{};render();},err=>{
    console.error(err);showStatus('⚠️ 同期エラー');useFirebase=false;lsLoad();
  });
}else{lsLoad();}

async function saveToBackend(ev){
  if(useFirebase){
    syncBar.classList.add('show');
    try{
      const{_key,...data}=ev;
      if(_key)await eventsRef.child(_key).set(data);
      else await eventsRef.push(data);
    }catch(e){showStatus('⚠️ 保存エラー');}
    finally{syncBar.classList.remove('show');}
  }else{
    const{_key,...data}=ev;
    const key=_key||('ev_'+Date.now()+'_'+Math.random().toString(36).slice(2));
    events[key]=data;lsSave();render();
  }
}
async function deleteFromBackend(key){
  if(useFirebase){
    syncBar.classList.add('show');
    try{await eventsRef.child(key).remove();}
    catch(e){showStatus('⚠️ 削除エラー');}
    finally{syncBar.classList.remove('show');}
  }else{delete events[key];lsSave();render();}
}

// ─── Copy mode ──────────────────────────────────────────
function startCopyMode(key){
  const ev=events[key]; if(!ev)return;
  copyMode=true; copySourceKey=key; copyDates=new Set();
  document.getElementById('copyEventTitle').textContent=ev.title;
  document.getElementById('copyCount').textContent='0';
  document.getElementById('copyBanner').classList.add('show');
  closeModal();
  render();
}
function exitCopyMode(){
  copyMode=false;copySourceKey=null;copyDates=new Set();
  document.getElementById('copyBanner').classList.remove('show');
  render();
}
function toggleCopyDate(dateStr){
  if(copyDates.has(dateStr))copyDates.delete(dateStr);
  else copyDates.add(dateStr);
  document.getElementById('copyCount').textContent=copyDates.size;
  render();
}
async function executeCopy(){
  const src=events[copySourceKey]; if(!src)return;
  const{_key,...data}=src;
  const dates=[...copyDates];
  exitCopyMode();
  for(const d of dates){
    await saveToBackend({...data,date:d});
  }
  showStatus(`✅ ${dates.length}日にコピーしました`);
}
document.getElementById('copyCancelBtn').onclick=exitCopyMode;
document.getElementById('copyExecBtn').onclick=executeCopy;

// ─── Render ─────────────────────────────────────────────
function renderLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  members.forEach(m=>{
    const el=document.createElement('div');el.className='legend-item';
    el.innerHTML=`<div class="dot" style="background:${m.color}"></div>${m.emoji}${m.label}`;
    leg.appendChild(el);
  });
}

function render(){
  renderLegend();
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent=`${currentYear}年${MONTHS[currentMonth]}`;

  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const first=new Date(currentYear,currentMonth,1).getDay();
  const days=new Date(currentYear,currentMonth+1,0).getDate();
  const prevDays=new Date(currentYear,currentMonth,0).getDate();
  const todayStr=toDS(today);
  const visible=getVisibleEvents(currentYear,currentMonth);
  // 翌月の予定も取得
  const nextMo=currentMonth===11?0:currentMonth+1;
  const nextYr=currentMonth===11?currentYear+1:currentYear;
  const visibleNext=getVisibleEvents(nextYr,nextMo);
  const mobile=window.innerWidth<480;
  const memberOrder=members.map(m=>m.id);

  // 曜日ヘッダー
  ['日','月','火','水','木','金','土'].forEach((name,col)=>{
    const h=document.createElement('div');
    h.className='day-header'+(col===0?' sun':col===6?' sat':'');
    h.textContent=name;grid.appendChild(h);
  });

  // 当月42マス + 翌月プレビュー列
  for(let row=0;row<6;row++){
    for(let col=0;col<7;col++){
      const i=row*7+col;
      const cell=document.createElement('div');
      cell.className='cell';

      let d,dateStr,inMonth=true,isNextPreview=false;
      if(i<first){
        d=prevDays-first+i+1;
        const mo=currentMonth===0?11:currentMonth-1;
        const yr=currentMonth===0?currentYear-1:currentYear;
        dateStr=`${yr}-${pad(mo+1)}-${pad(d)}`;inMonth=false;
      }else if(i-first>=days){
        d=i-first-days+1;
        dateStr=`${nextYr}-${pad(nextMo+1)}-${pad(d)}`;
        inMonth=false;isNextPreview=true;
      }else{
        d=i-first+1;
        dateStr=`${currentYear}-${pad(currentMonth+1)}-${pad(d)}`;
      }

      if(!inMonth){
        if(isNextPreview)cell.classList.add('next-month-preview');
        else cell.classList.add('other-month');
      }
      if(dateStr===todayStr)cell.classList.add('today');
      if(copyMode&&copyDates.has(dateStr))cell.classList.add('copy-selected');

      const dateEl=document.createElement('div');
      dateEl.className='cell-date';dateEl.textContent=d;
      if(col===0)dateEl.style.color='#e05a5a';
      if(col===6)dateEl.style.color='var(--papa)';
      cell.appendChild(dateEl);

      // クリック挙動
      cell.onclick=()=>{
        if(copyMode){toggleCopyDate(dateStr);return;}
        openDayDetail(dateStr);
      };

      // 予定チップ
      const src=isNextPreview?visibleNext:visible;
      const dayEvts=src.filter(e=>e.date===dateStr)
        .sort((a,b)=>{
          const ai=memberOrder.indexOf(a.who),bi=memberOrder.indexOf(b.who);
          return(ai===-1?999:ai)-(bi===-1?999:bi);
        });

      dayEvts.forEach(ev=>{
        const mem=getMember(ev.who);
        const chip=document.createElement('div');
        chip.className='event-chip';
        chip.style.background=mem.light;chip.style.color=mem.color;

        const base=mobile?.55:.67;
        const titleEl=document.createElement('div');
        titleEl.className='chip-title';titleEl.textContent=ev.title;
        const len=ev.title.length;
        if(len<=6){
          titleEl.classList.add('short');
          const sc=len<=2?1:len<=3?.92:len<=4?.84:len<=5?.76:.68;
          titleEl.style.fontSize=(base*sc)+'rem';
        }else{
          titleEl.style.fontSize=(base*(len<=9?.80:len<=12?.70:.60))+'rem';
        }
        chip.appendChild(titleEl);
        if(ev.timeStart){
          const tStr=ev.timeStart+(ev.timeEnd?'–'+ev.timeEnd:'');
          const timeEl=document.createElement('div');
          timeEl.className='chip-time';timeEl.textContent=tStr;
          const tb=mobile?.46:.56,tl=tStr.length;
          timeEl.style.fontSize=(tb*(tl<=5?1:tl<=8?.88:tl<=11?.76:.65))+'rem';
          chip.appendChild(timeEl);
        }
        chip.onclick=e=>{
          e.stopPropagation();
          if(copyMode){toggleCopyDate(dateStr);return;}
          openDayDetail(dateStr);
        };
        cell.appendChild(chip);
      });

      grid.appendChild(cell);
    }
  }
  renderUpcoming();
}

function getVisibleEvents(year,month){
  const results=[];
  const dim=new Date(year,month+1,0).getDate();
  Object.entries(events).forEach(([key,ev])=>{
    if(!ev?.date)return;
    const evDate=new Date(ev.date+'T00:00:00');
    const evD=evDate.getDate();
    const tag={...ev,_key:key};
    if(!ev.repeat||ev.repeat==='none'){results.push(tag);}
    else if(ev.repeat==='weekly'){
      const dow=evDate.getDay();
      for(let d=1;d<=dim;d++){
        const cd=new Date(year,month,d);
        if(cd.getDay()===dow&&cd>=evDate)
          results.push({...tag,date:`${year}-${pad(month+1)}-${pad(d)}`});
      }
    }else if(ev.repeat==='monthly'&&evD<=dim){
      const td=new Date(year,month,evD);
      if(td>=evDate)results.push({...tag,date:`${year}-${pad(month+1)}-${pad(evD)}`});
    }
  });
  return results;
}

function renderUpcoming(){
  const list=document.getElementById('upcomingList');list.innerHTML='';
  const upcoming=[];
  const memberOrder=members.map(m=>m.id);
  for(let i=0;i<60;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const ds=toDS(d);
    getVisibleEvents(d.getFullYear(),d.getMonth()).filter(e=>e.date===ds)
      .forEach(e=>upcoming.push({...e,_ds:ds}));
  }
  upcoming.sort((a,b)=>{
    if(a._ds!==b._ds)return a._ds>b._ds?1:-1;
    const ai=memberOrder.indexOf(a.who),bi=memberOrder.indexOf(b.who);
    return(ai===-1?999:ai)-(bi===-1?999:bi);
  });
  if(!upcoming.length){
    list.innerHTML='<div style="color:var(--text-muted);font-size:.80rem;padding:8px 4px">予定がありません</div>';return;
  }
  upcoming.slice(0,8).forEach(ev=>{
    const mem=getMember(ev.who);
    const item=document.createElement('div');item.className='upcoming-item';
    const ts=ev.timeStart?ev.timeStart+(ev.timeEnd?'–'+ev.timeEnd:''):'';
    item.innerHTML=`
      <div class="upcoming-bar" style="background:${mem.color}"></div>
      <div class="upcoming-date">${fmtDate(ev._ds)}</div>
      <div style="font-size:.70rem;padding:2px 5px;border-radius:5px;background:${mem.light};color:${mem.color};font-weight:700;white-space:nowrap;flex-shrink:0">${mem.emoji}${mem.label}</div>
      <div class="upcoming-title">${ev.title}${ts?'<span style="font-size:.70rem;color:var(--text-muted);margin-left:5px">'+ts+'</span>':''}</div>`;
    item.onclick=()=>{if(!copyMode)openModal(ev._key);};
    list.appendChild(item);
  });
}

function fmtDate(ds){
  const[y,m,d]=ds.split('-').map(Number);
  const dows=['日','月','火','水','木','金','土'];
  const t=new Date();
  if(y===t.getFullYear()&&m===t.getMonth()+1&&d===t.getDate())return'今日';
  return`${m}/${d}(${dows[new Date(y,m-1,d).getDay()]})`;
}

// ─── Modal ──────────────────────────────────────────────
function buildWhoButtons(){
  const c=document.getElementById('whoBtns');c.innerHTML='';
  members.forEach(m=>{
    const btn=document.createElement('button');
    btn.type='button';btn.className='who-btn';btn.dataset.who=m.id;
    btn.textContent=`${m.emoji} ${m.label}`;
    if(m.id===selectedWho)btn.classList.add('selected-'+m.id);
    btn.onclick=()=>{
      selectedWho=m.id;
      document.querySelectorAll('.who-btn').forEach(b=>{
        b.className='who-btn';
        if(b.dataset.who===selectedWho)b.classList.add('selected-'+selectedWho);
      });
    };
    c.appendChild(btn);
  });
}

function openModal(key,prefillDate){
  if(copyMode)return;
  editingKey=key||null;
  // コピーボタン削除リセット
  document.getElementById('copyBtnRow')?.remove();
  if(key){
    const ev=events[key];if(!ev)return;
    document.getElementById('modalTitle').textContent='予定を編集';
    document.getElementById('fTitle').value=ev.title||'';
    document.getElementById('fDate').value=ev.date||'';
    document.getElementById('fTimeStart').value=ev.timeStart||'';
    document.getElementById('fTimeEnd').value=ev.timeEnd||'';
    document.getElementById('fRepeat').value=ev.repeat||'none';
    document.getElementById('fMemo').value=ev.memo||'';
    selectedWho=ev.who||'kazoku';
    if(!document.getElementById('deleteBtn')){
      const db2=document.createElement('button');
      db2.type='button';db2.className='btn-delete';db2.id='deleteBtn';db2.textContent='削除';
      db2.onclick=deleteEvent;
      document.getElementById('modalActions').insertBefore(db2,document.getElementById('cancelBtn'));
    }
    // コピーボタン行追加
    const copyRow=document.createElement('div');
    copyRow.id='copyBtnRow';copyRow.style.marginTop='8px';
    const copyBtn=document.createElement('button');
    copyBtn.type='button';copyBtn.className='btn-copy';
    copyBtn.textContent='📋 別の日にコピー';
    copyBtn.onclick=()=>startCopyMode(key);
    copyRow.appendChild(copyBtn);
    document.getElementById('overlay').querySelector('.modal').appendChild(copyRow);
  }else{
    document.getElementById('modalTitle').textContent='予定を追加';
    ['fTitle','fTimeStart','fTimeEnd','fMemo'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fDate').value=prefillDate||'';
    document.getElementById('fRepeat').value='none';
    selectedWho='kazoku';
    document.getElementById('deleteBtn')?.remove();
  }
  buildWhoButtons();
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('copyBtnRow')?.remove();
  editingKey=null;
}

async function saveEvent(){
  const title=document.getElementById('fTitle').value.trim();
  const date=document.getElementById('fDate').value;
  if(!title||!date){alert('タイトルと日付を入力してください');return;}
  const ev={title,date,
    timeStart:document.getElementById('fTimeStart').value,
    timeEnd:document.getElementById('fTimeEnd').value,
    who:selectedWho,repeat:document.getElementById('fRepeat').value,
    memo:document.getElementById('fMemo').value.trim()};
  if(editingKey)ev._key=editingKey;
  closeModal();await saveToBackend(ev);
}

async function deleteEvent(){
  if(!confirm('この予定を削除しますか？'))return;
  const key=editingKey;closeModal();await deleteFromBackend(key);
}

// ─── Day Detail ─────────────────────────────────────────
function openDayDetail(dateStr){
  const [y,m,d]=dateStr.split('-').map(Number);
  const DAYS=['日','月','火','水','木','金','土'];
  const dow=DAYS[new Date(y,m-1,d).getDay()];
  const t=new Date();
  const label=(y===t.getFullYear()&&m===t.getMonth()+1&&d===t.getDate())
    ?`今日 ${m}/${d}(${dow})`:`${m}月${d}日(${dow})`;
  document.getElementById('dayDetailTitle').textContent=label;

  const memberOrder=members.map(m=>m.id);
  const evts=getVisibleEvents(y,m-1).filter(e=>e.date===dateStr)
    .sort((a,b)=>{
      const ai=memberOrder.indexOf(a.who),bi=memberOrder.indexOf(b.who);
      return(ai===-1?999:ai)-(bi===-1?999:bi);
    });

  const list=document.getElementById('dayEventList');
  list.innerHTML='';
  if(!evts.length){
    list.innerHTML='<div class="day-empty">📭 この日の予定はありません</div>';
  }else{
    evts.forEach(ev=>{
      const mem=getMember(ev.who);
      const item=document.createElement('div');
      item.className='day-event-item';
      const ts=ev.timeStart?(ev.timeStart+(ev.timeEnd?'–'+ev.timeEnd:'')):'';
      item.innerHTML=`
        <div class="day-event-bar" style="background:${mem.color}"></div>
        <div class="day-event-body">
          <div class="day-event-title">${ev.title}</div>
          ${ts?`<div class="day-event-time">🕐 ${ts}</div>`:''}
          ${ev.memo?`<div class="day-event-time">📝 ${ev.memo}</div>`:''}
        </div>
        <div class="day-event-who" style="background:${mem.light};color:${mem.color}">${mem.emoji}${mem.label}</div>`;
      item.onclick=()=>{
        closeDayDetail();
        setTimeout(()=>openModal(ev._key),50);
      };
      list.appendChild(item);
    });
  }

  // ＋ボタン
  document.getElementById('dayAddBtn').onclick=()=>{
    closeDayDetail();
    setTimeout(()=>openModal(null,dateStr),50);
  };

  document.getElementById('dayOverlay').classList.add('open');
}

function closeDayDetail(){
  document.getElementById('dayOverlay').classList.remove('open');
}

document.getElementById('dayOverlay').onclick=e=>{
  if(e.target===e.currentTarget)closeDayDetail();
};


function prevMonth(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}render();}
function nextMonth(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}render();}

document.getElementById('overlay').onclick=e=>{if(e.target===e.currentTarget)closeModal();};
document.getElementById('cancelBtn').onclick=closeModal;
document.getElementById('saveBtn').onclick=saveEvent;
document.getElementById('fabBtn').onclick=()=>openModal(null,null);
document.getElementById('prevBtn').onclick=prevMonth;
document.getElementById('nextBtn').onclick=nextMonth;

// ─── Swipe (横スクロール) ────────────────────────────────
(()=>{
  const wrap=document.getElementById('calWrap');
  let startX=0,startY=0,moved=false;
  wrap.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;moved=false;
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)moved=true;
  },{passive:true});
  wrap.addEventListener('touchend',e=>{
    if(!moved)return;
    const dx=e.changedTouches[0].clientX-startX;
    if(Math.abs(dx)>50){
      if(dx<0)nextMonth();else prevMonth();
    }
  },{passive:true});
})();

// ─── 下スワイプでモーダルを閉じる（ハンドル＋画面上部） ──
(()=>{
  ['overlay','settingsOverlay','dayOverlay'].forEach(overlayId=>{
    const overlay=document.getElementById(overlayId);
    const modal=overlay.querySelector('.modal');
    const handle=modal.querySelector('.modal-handle');
    let startY=0,dragging=false;

    function closeThis(){
      modal.style.transform='translateY(100%)';
      modal.style.transition='transform .25s ease';
      setTimeout(()=>{
        modal.style.transform='';
        modal.style.transition='';
        if(overlayId==='overlay')closeModal();
        else if(overlayId==='dayOverlay')closeDayDetail();
        else overlay.classList.remove('open');
      },220);
    }

    function onStart(clientY){
      startY=clientY; dragging=true;
      modal.style.transition='none';
    }
    function onMove(clientY){
      if(!dragging)return;
      const dy=clientY-startY;
      if(dy>0)modal.style.transform=`translateY(${dy}px)`;
    }
    function onEnd(clientY){
      if(!dragging)return;
      dragging=false;
      const dy=clientY-startY;
      if(dy>60){
        closeThis();
      }else{
        modal.style.transition='transform .25s ease';
        modal.style.transform='';
      }
    }

    // ① ハンドルからのスワイプ（従来通り）
    handle.addEventListener('touchstart',e=>{onStart(e.touches[0].clientY);},{passive:true});
    handle.addEventListener('touchmove', e=>{onMove(e.touches[0].clientY);},{passive:true});
    handle.addEventListener('touchend',  e=>{onEnd(e.changedTouches[0].clientY);},{passive:true});

    // ② 画面上部（上30px）からの下スワイプ
    let screenSwipeActive=false;
    document.addEventListener('touchstart',e=>{
      if(!overlay.classList.contains('open'))return;
      const touch=e.touches[0];
      // 画面上端30px以内からのタッチのみ
      if(touch.clientY<=30){
        screenSwipeActive=true;
        onStart(touch.clientY);
      }else{
        screenSwipeActive=false;
      }
    },{passive:true});
    document.addEventListener('touchmove',e=>{
      if(!screenSwipeActive)return;
      onMove(e.touches[0].clientY);
    },{passive:true});
    document.addEventListener('touchend',e=>{
      if(!screenSwipeActive)return;
      screenSwipeActive=false;
      onEnd(e.changedTouches[0].clientY);
    },{passive:true});

    // ③ モーダル内が上端にある時の下スワイプ
    let modalSwipeActive=false,modalSwipeStartY=0;
    modal.addEventListener('touchstart',e=>{
      modalSwipeStartY=e.touches[0].clientY;
      modalSwipeActive=(modal.scrollTop<=0);
    },{passive:true});
    modal.addEventListener('touchmove',e=>{
      if(!modalSwipeActive)return;
      const dy=e.touches[0].clientY-modalSwipeStartY;
      if(dy>0)modal.style.transform=`translateY(${dy}px)`;
    },{passive:true});
    modal.addEventListener('touchend',e=>{
      if(!modalSwipeActive)return;
      modalSwipeActive=false;
      const dy=e.changedTouches[0].clientY-modalSwipeStartY;
      modal.style.transition='transform .25s ease';
      if(dy>80)closeThis();
      else modal.style.transform='';
    },{passive:true});
  });
})();

// ─── Settings ───────────────────────────────────────────
document.getElementById('settingsBtn').onclick=()=>{
  const rows=document.getElementById('settingRows');rows.innerHTML='';
  members.forEach((m,i)=>{
    const row=document.createElement('div');row.className='setting-row';
    row.innerHTML=`<label>${m.emoji}</label>
      <input type="text" id="sLabel${i}" value="${m.label}" placeholder="名前">
      <input type="color" id="sColor${i}" value="${m.color}">`;
    rows.appendChild(row);
  });
  document.getElementById('settingsOverlay').classList.add('open');
};
document.getElementById('settingsCancelBtn').onclick=()=>document.getElementById('settingsOverlay').classList.remove('open');
document.getElementById('settingsSaveBtn').onclick=()=>{
  members.forEach((m,i)=>{
    const l=document.getElementById(`sLabel${i}`).value.trim();
    const c=document.getElementById(`sColor${i}`).value;
    if(l)m.label=l;m.color=c;m.light=c+'33';
  });
  saveMembers();document.getElementById('settingsOverlay').classList.remove('open');render();
};
document.getElementById('settingsOverlay').onclick=e=>{if(e.target===e.currentTarget)document.getElementById('settingsOverlay').classList.remove('open');};

// ─── Time auto-colon ────────────────────────────────────
function setupTime(el){
  el.addEventListener('input',function(){
    let r=this.value.replace(/\D/g,'');if(!r){this.value='';return;}
    if(r.length>4)r=r.slice(0,4);
    this.value=r.length>=3?r.slice(0,2)+':'+r.slice(2):r;
  });
  el.addEventListener('blur',function(){
    const m=this.value.match(/^(\d{1,2})(?::(\d{0,2}))?$/);
    if(m)this.value=m[1].padStart(2,'0')+':'+(m[2]||'00').padEnd(2,'0');
  });
}
setupTime(document.getElementById('fTimeStart'));
setupTime(document.getElementById('fTimeEnd'));

// ─── PWA ────────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!localStorage.getItem('pwa_dismissed'))
    document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').onclick=async()=>{
  document.getElementById('installBanner').classList.remove('show');
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
};
document.getElementById('installDismiss').onclick=()=>{
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('pwa_dismissed','1');
};
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
if(isIOS&&!navigator.standalone&&!localStorage.getItem('ios_hint')){
  setTimeout(()=>document.getElementById('iosBanner').classList.add('show'),1800);
}
document.getElementById('iosClose').onclick=()=>{
  document.getElementById('iosBanner').classList.remove('show');
  localStorage.setItem('ios_hint','1');
};

// ─── Go ─────────────────────────────────────────────────
render();
</script>
